[workspace]
resolver = "2"
members = ["alex-sdk", "alex-sdk-cli"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/The10thHunter/alexandria-sdk"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tar = "0.4"
flate2 = "1"
sha2 = "0.10"
hex = "0.4"
jsonschema = { version = "0.17", default-features = false, features = ["draft202012"] }
anyhow = "1"
thiserror = "1"
tempfile = "3"
clap = { version = "4", features = ["derive"] }
